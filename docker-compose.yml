version: '3.8'

services:
  db:
    image: paradedb/paradedb:latest
    container_name: hybrid_rag_db
    environment:
      - POSTGRES_DB=hybrid_rag
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: hybrid_rag_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: hybrid_rag_api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/hybrid_rag
      - REDIS_URL=redis://redis:6379/0
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: hybrid_rag_worker
    command: celery -A src.worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/hybrid_rag
      - REDIS_URL=redis://redis:6379/0
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
